name: Update FX rates

on:
  schedule:
    # 15:15 UTC is after the ECB's ~16:00 CET/CEST daily publication
    # in both winter (UTC+1) and summer (UTC+2) time, Mon-Fri.
    - cron: "15 15 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch ECB rates
        run: python scripts/fetch_ecb_rates.py

      - name: Commit rates.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rates.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update FX rates ($(date -u +%F))"
            git push
          fi
