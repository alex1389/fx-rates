<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Upwork Proposal Assistant</title>
  <style>
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 14px;
      color: #1c2b34;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 8px;
    }
    p {
      font-size: 12.5px;
      color: #57666d;
      line-height: 1.4;
    }
    button {
      width: 100%;
      background: #148a5a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
    }
    #status {
      font-size: 12px;
      margin-top: 10px;
    }
    .ok { color: #148a5a; }
    .warn { color: #b35c00; }
  </style>
</head>
<body>
  <h1>Upwork Proposal Assistant</h1>
  <p>Open an Upwork job or application page to review or generate a proposal — a floating panel appears in the bottom-right corner.</p>
  <button id="openOptions">Open settings</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
